name: Daily AI Event Radar

on:
  schedule:
    # Runs at 15:00 UTC. 
    # During Daylight Saving Time (DST), this equals 8:00 AM Pacific Time.
    # During Standard Time, this equals 7:00 AM Pacific Time.
    - cron: '0 15 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  run-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit the updated outputs back to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Event Radar
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MEETUP_API_KEY: ${{ secrets.MEETUP_API_KEY }}
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python main.py --days 30 --min-score 3

      - name: Upload outputs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radar-outputs
          path: |
            outputs/events.csv
            outputs/events.json
            outputs/report.md
          retention-days: 14

      - name: Commit and push updated outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the output files
          git add outputs/events.csv outputs/events.json outputs/report.md || true
          
          # Commit only if there are changes
          git diff --staged --quiet || git commit -m "chore: update daily event radar outputs"
          
          # Push the changes
          git push
